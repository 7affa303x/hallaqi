<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F766E" />
  <title>حلاقي — بدون اتصال</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #F0FDFA 0%, #CCFBF1 55%, #99F6E4 100%);
      color: #134E4A;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 22rem;
      background: #fff;
      border: 1px solid #99F6E4;
      border-radius: 1.25rem;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(15, 118, 110, 0.12);
    }
    h1 { font-size: 1.15rem; margin: 0 0 0.5rem; }
    p { font-size: 0.85rem; line-height: 1.6; margin: 0 0 1.25rem; color: #5B7A78; }
    button {
      width: 100%;
      height: 2.75rem;
      border: 0;
      border-radius: 0.85rem;
      background: #0F766E;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تحقق من الشبكة ثم أعد المحاولة. بعض الصفحات المحفوظة قد تبقى متاحة بعد أول زيارة.</p>
    <button type="button" onclick="location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
