name: Apply Supabase Migrations

# Pushes pending SQL migrations to the production Supabase project.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/apply-db-migrations.yml'

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        run: npm install -g supabase@2.109.1

      - name: Link and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: cdwzbtjwqybnahhbhldy
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN:-}"
          test -n "${SUPABASE_DB_PASSWORD:-}"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          supabase db push --linked --yes

      - name: Verify booking request RPCs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: cdwzbtjwqybnahhbhldy
        run: |
          set -euo pipefail
          supabase db query --linked --yes "
            SELECT proname
            FROM pg_proc
            WHERE pronamespace = 'public'::regnamespace
              AND proname IN (
                'create_booking_with_services',
                'accept_booking_with_time',
                'get_booking_client_phone'
              )
            ORDER BY 1;
          " | tee rpc-check.txt
          grep -q accept_booking_with_time rpc-check.txt
          grep -q get_booking_client_phone rpc-check.txt
          echo "Booking request migration verified"
