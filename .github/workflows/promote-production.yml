name: Promote Preview to Production

# Instant alias move — does NOT rebuild (bypasses Vercel build rate limits).
on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Preview deployment URL to promote to production
        required: true
        default: https://hallaqi-git-cursor-prod-auth-discovery-hard-fix-93d3-souf303x.vercel.app
  # Auto-run when this workflow file is updated on main (used to unblock prod).
  push:
    branches: [main]
    paths:
      - '.github/workflows/promote-production.yml'

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@41.7.8

      - name: Promote preview to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "VERCEL_TOKEN secret is missing"
            exit 1
          fi
          URL="${{ github.event.inputs.deployment_url || 'https://hallaqi-git-cursor-prod-auth-discovery-hard-fix-93d3-souf303x.vercel.app' }}"
          echo "Promoting: $URL"
          vercel promote "$URL" --token "$VERCEL_TOKEN" --yes

      - name: Verify auth-shell.js on production
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            sleep 5
            CT=$(curl -sSI "https://hallaqi.app/auth-shell.js" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}')
            echo "attempt $i content-type: $CT"
            if echo "$CT" | grep -q 'javascript'; then
              curl -sS "https://hallaqi.app/" | grep -q 'auth-shell.js'
              echo "Production auth-shell OK"
              exit 0
            fi
          done
          echo "Production still serving non-JS for /auth-shell.js"
          exit 1
