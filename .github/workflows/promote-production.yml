name: Promote Preview to Production

# Instant alias move — does NOT rebuild (bypasses Vercel build rate limits).
on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Preview deployment URL to promote to production
        required: true
        default: https://hallaqi-git-cursor-prod-auth-discovery-hard-fix-93d3-souf303x.vercel.app
  push:
    branches: [main]
    paths:
      - '.github/workflows/promote-production.yml'

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@41.7.8

      - name: Debug token teams / projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          echo "whoami:"; vercel whoami --token "$VERCEL_TOKEN" || true
          echo "teams:"; vercel teams ls --token "$VERCEL_TOKEN" || true
          echo "projects (souf303x):"; vercel project ls --token "$VERCEL_TOKEN" --scope souf303x || true

      - name: Promote preview to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.deployment_url || 'https://hallaqi-git-cursor-prod-auth-discovery-hard-fix-93d3-souf303x.vercel.app' }}"
          echo "Promoting: $URL"
          # Try scoped promote first, then alias fallbacks.
          if vercel promote "$URL" --token "$VERCEL_TOKEN" --scope souf303x --yes; then
            echo "promote ok (scope souf303x)"
          elif vercel promote "$URL" --token "$VERCEL_TOKEN" --yes; then
            echo "promote ok (default scope)"
          else
            echo "promote failed — trying alias set"
            vercel alias set "$URL" hallaqi.app --token "$VERCEL_TOKEN" --scope souf303x --yes
            vercel alias set "$URL" www.hallaqi.app --token "$VERCEL_TOKEN" --scope souf303x --yes || true
          fi

      - name: Verify auth-shell.js on production
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            CT=$(curl -sSI "https://hallaqi.app/auth-shell.js" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}')
            echo "attempt $i content-type: $CT"
            if echo "$CT" | grep -q 'javascript'; then
              curl -sS "https://hallaqi.app/" | grep -q 'auth-shell.js'
              echo "Production auth-shell OK"
              exit 0
            fi
          done
          echo "Production still serving non-JS for /auth-shell.js"
          curl -sSI "https://hallaqi.app/auth-shell.js" | head -20
          exit 1
