    <!-- Prefer mobile layout before React hydrates (survives browser Desktop Site). -->
    <script>
      (function () {
        try {
          var nav = navigator;
          var ua = nav.userAgent || '';
          var hint = nav.userAgentData && nav.userAgentData.mobile === true;
          var mobileUa = /Android.+Mobile|iPhone|iPod|iPad|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua);
          var touch = (nav.maxTouchPoints || 0) > 0;
          var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
          var noHover = window.matchMedia && window.matchMedia('(hover: none)').matches;
          var shortSide = Math.min(screen.width || 0, screen.height || 0);
          if (hint || mobileUa || (touch && (coarse || noHover) && shortSide > 0 && shortSide <= 920)) {
            document.documentElement.classList.add('hallaqi-mobile-shell');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
